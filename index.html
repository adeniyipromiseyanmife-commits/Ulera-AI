<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#07100F">
<title>HealthGuard AI</title>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root {
  --teal:#0B9E8A;--teal2:#12C5AD;--teal3:rgba(11,158,138,0.12);
  --green:#22C55E;--amber:#F59E0B;--red:#EF4444;--purple:#7C3AED;--purple2:#A78BFA;
  --bg:#07100F;--bg2:#0D1A18;--card:#101E1C;--card2:#152421;
  --border:rgba(11,158,138,0.15);--border2:rgba(11,158,138,0.25);
  --text:#E2F0EE;--muted:#5E8E89;--muted2:#8BBDB8;
  --font:'Outfit',sans-serif;--mono:'JetBrains Mono',monospace;
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
html,body{width:100%;height:100dvh;overflow:hidden;background:var(--bg);font-family:var(--font);color:var(--text);overscroll-behavior-y:none;}
#app{width:100%;height:100dvh;position:relative;display:flex;flex-direction:column;background:var(--bg2);}

/* GEMINI GLOW INTERFERENCE */
.ai-glow-container {
    position: relative;
    width: 120px; height: 120px;
    margin: 20px auto;
    display: flex; align-items: center; justify-content: center;
}
.glow-ring {
    position: absolute;
    width: 100%; height: 100%;
    border-radius: 50%;
    background: conic-gradient(from 0deg, var(--teal), var(--purple), var(--teal2), var(--purple2), var(--teal));
    filter: blur(15px);
    opacity: 0.6;
    animation: rotateGlow 3s linear infinite;
    display: none;
}
@keyframes rotateGlow { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }

.pulse-inner {
    width: 80px; height: 80px;
    background: var(--bg);
    border-radius: 50%;
    z-index: 2;
    display: flex; align-items: center; justify-content: center;
    border: 2px solid var(--border2);
}

/* SCREEN & NAV */
.screen{flex:1;display:none;flex-direction:column;overflow:hidden;}
.screen.active{display:flex;}
.bottom-nav{height:75px;background:var(--bg);border-top:1px solid var(--border);display:flex;justify-content:space-around;align-items:center;padding-bottom:10px;}
.nav-item{display:flex;flex-direction:column;align-items:center;color:var(--muted);cursor:pointer;flex:1;}
.nav-item.active{color:var(--teal2);}

/* CHAT STYLES */
.chat-msgs{flex:1;overflow-y:auto;padding:1.2rem;display:flex;flex-direction:column;gap:1.2rem;}
.bubble-ai { background: transparent; border: none; padding: 0; max-width: 90%; font-size: 0.95rem; line-height: 1.5; color: var(--text); }
.bubble-user { background: var(--card2); border: 1px solid var(--border); padding: 0.8rem 1rem; border-radius: 18px 18px 4px 18px; align-self: flex-end; max-width: 85%; }

/* CAMERA FEED */
#video-wrap{width:100%;aspect-ratio:1/1;background:#000;border-radius:24px;position:relative;overflow:hidden;display:none;margin-top:15px;border:2px solid var(--purple);}
#live-video{width:100%;height:100%;object-fit:cover;}
.torch-btn{position:absolute;bottom:15px;right:15px;background:rgba(0,0,0,0.5);border:1px solid var(--purple2);color:white;padding:10px;border-radius:50%;z-index:100;}

/* TYPING INDICATOR */
.typing { display: flex; gap: 5px; padding: 10px 0; }
.dot { width: 5px; height: 5px; background: var(--teal); border-radius: 50%; animation: bounce 1.4s infinite ease-in-out both; }
.dot:nth-child(1) { animation-delay: -0.32s; } .dot:nth-child(2) { animation-delay: -0.16s; }
@keyframes bounce { 0%, 80%, 100% { transform: scale(0); } 40% { transform: scale(1); } }
</style>
</head>
<body>

<div id="app">
  <div id="m-1" class="screen active">
    <div style="padding:1rem;display:flex;justify-content:space-between;align-items:center;">
      <div style="font-weight:700;font-size:1.1rem;color:var(--teal2);">HealthGuard AI</div>
      <button onclick="openPanel('liveAIPanel')" style="background:var(--teal3);border:1px solid var(--teal2);color:var(--teal2);padding:6px 12px;border-radius:20px;font-size:0.75rem;font-weight:600;">LIVE AI</button>
    </div>
    
    <div class="chat-msgs" id="chatContainer">
      <div class="msg-ai">
        <div class="bubble-ai">Hi Promise Adeniyi. I'm your health assistant. How can I help you today?</div>
      </div>
    </div>

    <div style="padding:1rem;background:var(--bg);display:flex;align-items:center;gap:10px;border-radius:30px 30px 0 0;">
      <div style="background:var(--card);flex:1;border-radius:25px;display:flex;align-items:center;padding:5px 15px;border:1px solid var(--border);">
        <input type="text" id="userInput" placeholder="Ask anything..." style="flex:1;background:none;border:none;color:white;padding:12px 0;outline:none;">
        <span style="font-size:1.2rem;cursor:pointer;margin-right:10px;">🎙️</span>
      </div>
      <button onclick="processChat()" style="background:var(--teal);border:none;color:white;width:48px;height:48px;border-radius:50%;font-size:1.2rem;display:flex;align-items:center;justify-content:center;">➔</button>
    </div>
  </div>

  <div id="m-2" class="screen">
    <div style="padding:1.5rem;"><h2 style="color:var(--teal2);">Burnout Tracker</h2></div>
    <div class="scroll-area">
        <div style="background:var(--card);padding:1.5rem;border-radius:20px;border:1px solid var(--border);">
            <p style="color:var(--muted2);margin-bottom:1rem;">Daily Stress Analysis</p>
            <input type="range" style="width:100%;accent-color:var(--teal);">
        </div>
    </div>
  </div>

  <div id="m-3" class="screen">
    <div style="padding:1.5rem;"><h2 style="color:var(--teal2);">HMO Navigator</h2></div>
    <div class="scroll-area">
        <div style="background:var(--card);padding:1.5rem;border-radius:20px;border:1px solid var(--border);">
            <select style="width:100%;background:var(--bg2);color:white;padding:12px;border-radius:10px;border:1px solid var(--border);">
                <option>Select Provider</option>
                <option>Reliance HMO</option>
                <option>AXA Mansard</option>
            </select>
        </div>
    </div>
  </div>

  <div id="liveAIPanel" style="position:fixed;inset:0;background:var(--bg2);z-index:100;display:none;flex-direction:column;">
    <div style="padding:1rem;display:flex;align-items:center;gap:15px;border-bottom:1px solid var(--border);">
      <button onclick="closePanel('liveAIPanel')" style="background:none;border:none;color:white;font-size:1.5rem;">✕</button>
      <div style="font-weight:700;">Live AI Consultation</div>
    </div>
    
    <div style="padding:1.5rem;text-align:center;">
      <div class="ai-glow-container">
          <div class="glow-ring" id="glowRing"></div>
          <div class="pulse-inner">
              <span id="ai-icon" style="font-size:2rem;">🛡️</span>
          </div>
      </div>
      <p id="live-status" style="color:var(--muted2);font-size:0.85rem;margin-top:10px;">Ready for voice or vision...</p>

      <div id="video-wrap">
        <video id="live-video" autoplay playsinline></video>
        <button id="torch-btn" class="torch-btn">🔦</button>
      </div>

      <div style="display:grid;gap:12px;margin-top:30px;">
        <button onclick="startVoice()" class="ob-btn" style="background:var(--teal);">🎤 Start Voice Chat</button>
        <button onclick="startCamera()" class="ob-btn" style="background:var(--purple);border:none;">📷 Start Vision Scan</button>
      </div>
    </div>
  </div>

  <div class="bottom-nav">
    <div class="nav-item active" onclick="switchMode(1)"><span>💬</span><p style="font-size:0.6rem;">Chat</p></div>
    <div class="nav-item" onclick="switchMode(2)"><span>🔥</span><p style="font-size:0.6rem;">Burnout</p></div>
    <div class="nav-item" onclick="switchMode(3)"><span>🏥</span><p style="font-size:0.6rem;">HMO</p></div>
  </div>
</div>

<script>
let stream = null;
let track = null;

function switchMode(n) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('active'));
  document.getElementById('m-'+n).classList.add('active');
  document.querySelectorAll('.nav-item')[n-1].classList.add('active');
}

function processChat() {
  const input = document.getElementById('userInput');
  const box = document.getElementById('chatContainer');
  if(!input.value.trim()) return;

  box.innerHTML += `<div class="msg-user"><div class="bubble-user">${input.value}</div></div>`;
  input.value = '';
  
  const tid = 't-'+Date.now();
  box.innerHTML += `<div id="${tid}" class="typing"><div class="dot"></div><div class="dot"></div><div class="dot"></div></div>`;
  box.scrollTop = box.scrollHeight;

  setTimeout(() => {
    document.getElementById(tid).remove();
    box.innerHTML += `<div class="msg-ai"><div class="bubble-ai">That's interesting, Promise. I'm analyzing that information against your health profile... What else can you tell me?</div></div>`;
    box.scrollTop = box.scrollHeight;
  }, 1800);
}

function startVoice() {
    document.getElementById('glowRing').style.display = 'block';
    document.getElementById('live-status').innerText = "Listening to Promise...";
    const speech = new SpeechSynthesisUtterance("I'm listening, Promise. Tell me what's on your mind.");
    window.speechSynthesis.speak(speech);
}

async function startCamera() {
  const v = document.getElementById('live-video');
  const wrap = document.getElementById('video-wrap');
  try {
    stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "environment" } });
    v.srcObject = stream;
    wrap.style.display = 'block';
    track = stream.getVideoTracks()[0];
    document.getElementById('torch-btn').onclick = toggleTorch;
  } catch(e) { alert("Camera failed. Ensure HTTPS."); }
}

async function toggleTorch() {
  if(!track) return;
  const props = track.getSettings();
  try {
    await track.applyConstraints({ advanced: [{ torch: !props.torch }] });
  } catch(e) { alert("Torch not supported on this browser."); }
}

function openPanel(id) { document.getElementById(id).style.display = 'flex'; }
function closePanel(id) { 
  document.getElementById(id).style.display = 'none';
  if(stream) stream.getTracks().forEach(t => t.stop());
  document.getElementById('glowRing').style.display = 'none';
}
</script>
</body>
</html>
