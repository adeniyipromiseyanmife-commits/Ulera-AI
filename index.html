<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#07100F">
<title>HealthGuard AI</title>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root {
  --teal:#0B9E8A;--teal2:#12C5AD;--teal3:rgba(11,158,138,0.12);
  --purple:#7C3AED;--purple2:#A78BFA;
  --bg:#07100F;--bg2:#0D1A18;--card:#101E1C;--card2:#152421;
  --border:rgba(11,158,138,0.15);--border2:rgba(11,158,138,0.25);
  --text:#E2F0EE;--muted:#5E8E89;--muted2:#8BBDB8;
  --font:'Outfit',sans-serif;
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
body{background:var(--bg);font-family:var(--font);color:var(--text);height:100dvh;overflow:hidden;display:flex;flex-direction:column;}

/* NAVIGATION */
.bottom-nav{height:75px;background:var(--bg);border-top:1px solid var(--border);display:flex;justify-content:space-around;align-items:center;padding-bottom:10px;z-index:100;}
.nav-item{display:flex;flex-direction:column;align-items:center;gap:4px;color:var(--muted);cursor:pointer;flex:1;text-align:center;}
.nav-item.active{color:var(--teal2);}
.nav-icon{font-size:1.3rem;}
.nav-label{font-size:0.6rem;font-weight:700;text-transform:uppercase;letter-spacing:0.5px;}

/* SCREENS */
.screen{flex:1;display:none;flex-direction:column;overflow:hidden;}
.screen.active{display:flex;}
.scroll-area{flex:1;overflow-y:auto;padding:1.5rem;}

/* CHAT MESSAGES */
.chat-msgs{flex:1;overflow-y:auto;padding:1.5rem;display:flex;flex-direction:column;gap:1.5rem;}
.msg-ai { display: flex; gap: 12px; align-items: flex-start; }
.ai-avatar { width: 32px; height: 32px; background: var(--teal3); border-radius: 50%; display: flex; align-items: center; justify-content: center; border: 1px solid var(--border2); flex-shrink: 0; font-size: 0.9rem; }
.bubble-ai { color: var(--text); font-size: 1rem; line-height: 1.6; max-width: 90%; }
.msg-user { align-self: flex-end; max-width: 85%; }
.bubble-user { background: var(--card2); border: 1px solid var(--border2); padding: 0.8rem 1.1rem; border-radius: 20px 20px 4px 20px; font-size: 0.95rem; }

/* ROLLING CIRCLES */
.typing { display: flex; gap: 5px; padding: 10px 0; }
.dot { width: 6px; height: 6px; background: var(--teal2); border-radius: 50%; animation: bounce 1.4s infinite ease-in-out both; }
.dot:nth-child(1) { animation-delay: -0.32s; } .dot:nth-child(2) { animation-delay: -0.16s; }
@keyframes bounce { 0%, 80%, 100% { transform: scale(0.6); opacity: 0.4; } 40% { transform: scale(1.1); opacity: 1; } }

/* GEMINI STYLE CHAT BAR (THE PART YOU REQUESTED) */
.chat-bar { padding: 0.8rem 1.2rem; background: var(--bg2); display: flex; flex-direction: column; gap: 0.8rem; border-top: 1px solid var(--border); }
.chat-input-row { display: flex; align-items: center; gap: 1rem; background: var(--card); border-radius: 28px; padding: 0.6rem 1.2rem; border: 1px solid var(--border2); }
.chat-input { flex: 1; background: none; border: none; color: var(--text); font-size: 1rem; outline: none; }
.chat-tools { display: flex; align-items: center; justify-content: space-between; padding: 0 0.5rem; }
.tool-left, .tool-right { display: flex; gap: 1.2rem; align-items: center; }
.icon-btn { background: none; border: none; color: var(--muted2); font-size: 1.4rem; cursor: pointer; display: flex; align-items: center; }
.pill-btn { background: var(--card2); border: 1px solid var(--border2); color: var(--text); padding: 4px 14px; border-radius: 16px; font-size: 0.85rem; font-weight: 500; }
.gemini-wave { width: 24px; height: 24px; background: linear-gradient(to top, #4285f4, #9b72cb, #d96570); border-radius: 4px; display: flex; align-items: center; justify-content: center; }

/* LOGIN CARDS */
.login-card { background: var(--card); border: 1px solid var(--border2); border-radius: 20px; padding: 2rem; margin-top: 2rem; }
.input-field { width: 100%; background: var(--bg2); border: 1px solid var(--border); padding: 12px; border-radius: 10px; color: white; margin-bottom: 1rem; outline: none; }
.btn-main { background: var(--teal); color: white; border: none; padding: 12px; border-radius: 10px; width: 100%; font-weight: 700; cursor: pointer; }

/* PANEL */
.panel { position: fixed; inset: 0; background: var(--bg2); z-index: 1000; display: none; flex-direction: column; }
#video-wrap { width: 90%; aspect-ratio: 1/1; background: #000; border-radius: 25px; margin: 20px auto; position: relative; overflow: hidden; border: 2px solid var(--purple); }
</style>
</head>
<body>

<div id="app">
  <div id="m-1" class="screen">
    <div class="scroll-area" style="text-align:center; display:flex; flex-direction:column; justify-content:center; align-items:center;">
        <div style="font-size:4rem; margin-bottom:1rem;">🏥</div>
        <h2 style="color:var(--teal2);">Health Facility Portal</h2>
        <p style="color:var(--muted2); margin-top:1rem;">Coming Soon to HealthGuard Ecosystem</p>
    </div>
  </div>

  <div id="m-2" class="screen">
    <div class="scroll-area">
        <h2 style="color:var(--teal2);">Professional Login</h2>
        <div class="login-card">
            <input type="text" class="input-field" placeholder="Medical ID Number">
            <input type="password" class="input-field" placeholder="Password">
            <button class="btn-main">Secure Login</button>
        </div>
    </div>
  </div>

  <div id="m-3" class="screen">
    <div class="scroll-area">
        <h2 style="color:var(--teal2);">Patient Portal</h2>
        <div class="login-card">
            <input type="text" class="input-field" placeholder="Patient ID">
            <input type="password" class="input-field" placeholder="Password">
            <button class="btn-main">Sign In</button>
        </div>
    </div>
  </div>

  <div id="m-chat" class="screen active">
    <div style="padding:1rem 1.5rem; display:flex; justify-content:space-between; align-items:center; border-bottom:1px solid var(--border);">
      <div style="font-weight:700; font-size:1.1rem; color:var(--teal2);">HEALTHGUARD-AI</div>
      <button onclick="openPanel('liveAIPanel')" style="background:var(--teal3); border:1px solid var(--teal2); color:var(--teal2); padding:6px 16px; border-radius:20px; font-size:0.75rem; font-weight:700;">LIVE AI</button>
    </div>
    
    <div class="chat-msgs" id="chatContainer">
      <div class="msg-ai">
        <div class="ai-avatar">🛡️</div>
        <div class="bubble-ai">Hi Promise Adeniyi. I'm HealthGuard-AI, your personal healthcare companion. How can I help?</div>
      </div>
    </div>

    <div class="chat-bar">
      <div class="chat-input-row">
        <input type="text" id="userInput" class="chat-input" placeholder="Ask HealthGuard AI...">
      </div>
      <div class="chat-tools">
        <div class="tool-left">
          <button class="icon-btn"><span>＋</span></button>
          <button class="icon-btn" style="font-size: 1.1rem;"><span>⌥</span></button>
        </div>
        <div class="tool-right">
          <button class="pill-btn">Fast</button>
          <button class="icon-btn">🎙️</button>
          <button class="icon-btn" onclick="processChat()" style="color:var(--teal2)">➔</button>
          <div class="gemini-wave">
            <div style="width:2px; height:10px; background:white; margin:0 1px;"></div>
            <div style="width:2px; height:14px; background:white; margin:0 1px;"></div>
            <div style="width:2px; height:8px; background:white; margin:0 1px;"></div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <div id="liveAIPanel" class="panel">
    <div style="padding:1rem; display:flex; align-items:center; gap:15px; border-bottom:1px solid var(--border);">
      <button onclick="closePanel('liveAIPanel')" style="background:none; border:none; color:white; font-size:1.5rem;">✕</button>
      <div style="font-weight:700;">AI Vision Analysis</div>
    </div>
    <div class="scroll-area" style="text-align:center;">
        <div id="video-wrap" style="display:none;">
            <video id="live-video" autoplay playsinline style="width:100%; height:100%; object-fit:cover;"></video>
        </div>
        <button onclick="startCamera()" class="btn-main" style="background:var(--purple); margin-top:20px;">📷 Start Camera Scan</button>
    </div>
  </div>

  <div class="bottom-nav">
    <div class="nav-item" onclick="switchMode(1)">
      <span class="nav-icon">🏥</span><span class="nav-label">Facility</span>
    </div>
    <div class="nav-item" onclick="switchMode(2)">
      <span class="nav-icon">👨‍⚕️</span><span class="nav-label">Pro</span>
    </div>
    <div class="nav-item active" onclick="switchMode('chat')">
      <span class="nav-icon">🛡️</span><span class="nav-label">HealthGuard</span>
    </div>
    <div class="nav-item" onclick="switchMode(3)">
      <span class="nav-icon">👤</span><span class="nav-label">Patient</span>
    </div>
  </div>
</div>

<script>
let stream = null;

function switchMode(n) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('active'));
  if(n === 'chat') {
    document.getElementById('m-chat').classList.add('active');
    document.querySelectorAll('.nav-item')[2].classList.add('active');
  } else {
    document.getElementById('m-'+n).classList.add('active');
    const idx = n == 1 ? 0 : (n == 2 ? 1 : 3);
    document.querySelectorAll('.nav-item')[idx].classList.add('active');
  }
}

function processChat() {
  const input = document.getElementById('userInput');
  const box = document.getElementById('chatContainer');
  if(!input.value.trim()) return;

  box.innerHTML += `<div class="msg-user"><div class="bubble-user">${input.value}</div></div>`;
  const val = input.value;
  input.value = '';
  
  const tid = 't-'+Date.now();
  box.innerHTML += `
    <div id="${tid}" class="msg-ai">
      <div class="ai-avatar">🛡️</div>
      <div class="typing"><div class="dot"></div><div class="dot"></div><div class="dot"></div></div>
    </div>`;
  box.scrollTop = box.scrollHeight;

  setTimeout(() => {
    const loader = document.getElementById(tid);
    if(loader) loader.querySelector('.typing').remove();
    loader.innerHTML += `<div class="bubble-ai">Analyzing "${val}", Promise. Based on your profile, I suggest checking your hydration levels. Would you like a more detailed summary?</div>`;
    box.scrollTop = box.scrollHeight;
  }, 1800);
}

async function startCamera() {
  const v = document.getElementById('live-video');
  const wrap = document.getElementById('video-wrap');
  try {
    stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "environment" } });
    v.srcObject = stream;
    wrap.style.display = 'block';
  } catch(e) { alert("Camera failed. Ensure you're on HTTPS."); }
}

function openPanel(id) { document.getElementById(id).style.display = 'flex'; }
function closePanel(id) { 
  document.getElementById(id).style.display = 'none';
  if(stream) stream.getTracks().forEach(t => t.stop());
}

// Allow Enter key to send
document.getElementById('userInput').addEventListener('keypress', function (e) {
    if (e.key === 'Enter') processChat();
});
</script>
</body>
</html>
